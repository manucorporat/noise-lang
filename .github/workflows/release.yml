# One version, one release. `noise-core` + `noise-cli` (crates.io) and `@noiselang/core` (npm) all
# ship together at the version in `packages/core/package.json`, which changesets owns.
#
# The loop: a PR adds a `.changeset/*.md` file describing its change. On merge to master this
# workflow sees pending changesets and opens/updates a "📦 Release" PR that applies the version bump
# (npm + Cargo, via ci:version) and the changelog. Merging *that* PR leaves no pending changesets,
# so this workflow instead runs ci:publish — crates.io first, then npm, then git tags.
#
# Every push to master runs this. Pushes that release nothing fall through both paths harmlessly:
# the publish step asks each registry what already exists and skips it.
name: 📦 Release

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  # npm publishes via trusted publishing (OIDC) — no NPM_TOKEN. This permission is what mints the
  # short-lived id-token npm trades for a publish credential; without it, npm falls back to looking
  # for a token and the publish fails. It also turns on provenance attestation automatically.
  id-token: write

jobs:
  release:
    name: Version PR or publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # A PAT, not GITHUB_TOKEN: pushes made with GITHUB_TOKEN don't trigger workflows, so the
          # Release PR would never get a CI run.
          token: ${{ secrets.RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      # pnpm 10, pinned by the root package.json `packageManager` field. Both bounds are load-bearing:
      # pnpm 11 regressed OIDC publishing (pnpm/pnpm#11513), and pnpm < 10.34 passes changesets'
      # `--no-git-checks` to npm as a CLI flag, which npm 12 rejects outright (see below).
      - uses: pnpm/action-setup@v4
      # NOTE: deliberately no `registry-url`. It looks helpful and is actively harmful here: it makes
      # setup-node write an .npmrc containing `_authToken=${NODE_AUTH_TOKEN}` plus a placeholder
      # NODE_AUTH_TOKEN, and npm prefers that empty token over the OIDC exchange — surfacing as a
      # baffling E404 on publish. See npm/cli#8730, actions/setup-node#1477.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # Trusted publishing needs npm >= 11.5.1 and Node 22 ships npm 10.x, so the npm installed here
      # is the one doing the OIDC exchange — a three-link chain: `changeset publish` sees a pnpm
      # workspace and spawns `pnpm publish`, whose `runNpm` shells out to plain `"npm"` off the PATH
      # (pnpm bundles no npm of its own) and forwards the full process env, OIDC vars included.
      - name: Install npm for trusted publishing
        run: npm install -g npm@latest && npm --version

      # Stable builds the crates and the single-threaded wasm; nightly + rust-src is what
      # `-Z build-std` needs for the threaded wasm build (see packages/core/scripts/build-wasm.sh).
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src
      - uses: Swatinem/rust-cache@v2
      - uses: jetli/wasm-pack-action@v0.4.0

      - run: pnpm install --frozen-lockfile

      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm run ci:version
          publish: pnpm run ci:publish
          title: "📦 Release"
          commit: "📦 Release"
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          # Deliberately no NPM_TOKEN: the changesets action writes an .npmrc auth line when it
          # finds one, and only falls through to trusted publishing when it doesn't. Setting it
          # would silently take the token path instead.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
