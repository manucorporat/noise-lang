# CI guardrails (plans/PLAN-TECH-DEBT.md Phase 0): every gate here is required to stay green.
# The bench corpus is covered by `cargo test` (tests/bench_corpus.rs runs every bench program),
# so no separate bench job is needed.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: test (workspace + gpu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      # The GPU leg (replacing the retired `--features jit` leg, PLAN-DROP-JIT D1). On a headless
      # runner `request_adapter` returns `None`, so every gated forcing declines to the interpreter
      # — which exercises exactly the graceful-fallback path the switch depends on, while still
      # compiling the whole `gpu` cone (wgpu, the WGSL emitter, `try_reduce`). The GPU tests check
      # against the analytic answer + reported standard error, so they pass whether the real Metal/
      # Vulkan path or the CPU decline produced the estimate. A macOS runner (which has Metal) would
      # additionally exercise the real dispatch path if one is ever added.
      - run: cargo test -p noise-core --features gpu

  lint:
    name: clippy + rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo clippy --all-targets --all-features -- -D warnings
      - run: cargo fmt --all --check

  wasm:
    name: wasm32 build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --target wasm32-unknown-unknown -p noise-wasm

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
